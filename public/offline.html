<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Veztra Soft POS</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        width: min(92vw, 480px);
        background: #111827;
        border: 1px solid #334155;
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.35rem;
      }
      p {
        margin: 0;
        color: #cbd5e1;
        line-height: 1.5;
      }
      .hint {
        margin-top: 14px;
        font-size: 0.9rem;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You’re offline</h1>
      <p>
        Veztra Soft POS is running in offline mode. Previously loaded screens and cached data are still available.
      </p>
      <p class="hint">
        Keep using POS locally. Data sync resumes automatically once internet connection returns.
      </p>
    </div>
  </body>
</html>
